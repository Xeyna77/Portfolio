<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Valentin</title>
    <link rel="stylesheet" href="style-projets.css"> <link rel="stylesheet" href="style-contact.css"> </head>
<body>

    <a href="index.html" class="back-btn">← Accueil</a>

    <header class="project-hero">
        <span class="tag">On discute ?</span>
        <h1>Me Contacter</h1>
    </header>

    <main class="container">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>Mes réseaux</h2>
                <p>N'hésitez pas à me contacter pour un stage, un projet collaboratif ou simplement pour échanger sur l'ingénierie.</p>
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/valentin-magnye-1b59752b7">LinkedIn</a>
                    <a href="https://github.com/Xeyna77">GitHub</a>
                    <a href="https://www.instagram.com/valou_mgy?igsh=dGM4bWk4OXVtdjky">Instagram</a>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <form action="https://formspree.io/f/xykndzlq" method="POST" id="contact-form">
                    <div class="input-group">
                        <label>Votre Nom</label>
                        <input type="text" name="name" required>
                    </div>

                    <div class="input-group">
                        <label>Votre Email</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label>Votre Message</label>
                        <textarea name="message" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">ENVOYER LE MESSAGE</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
